name: Deploy to Cloudflare Workers

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      # The lockfile is generated by npm 11; Node 22 ships npm 10, which
      # mishandles esbuild's optional platform deps (EBADPLATFORM on npm ci).
      - name: Match npm to the lockfile
        run: npm install -g npm@11

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build OpenNext
        run: npm run worker:build
        env:
          NEXT_PUBLIC_BASE_URL: https://townofpaonia.co
          NEXT_PUBLIC_CONVEX_URL: https://academic-elephant-432.convex.cloud

      - name: Deploy to Cloudflare Workers
        run: npm run deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
