name: Sync meetings (daily)

# Pulls the Town Board calendar from the Town's CivicClerk feed once a day and,
# only if anything changed, commits the refreshed data and redeploys the site.
# The official .gov calendar blocks bots, so the public CivicClerk OData API is
# the authoritative source (see scripts/sync-meetings.mjs).
#
# The commit here is made with GITHUB_TOKEN, which by design does NOT trigger the
# separate deploy workflow (GitHub prevents that recursion), so this job deploys
# inline. Net effect: at most one deploy per day, and none on days with no change.

on:
  schedule:
    - cron: "15 13 * * *" # 13:15 UTC = 7:15 AM Mountain (MDT) / 6:15 AM (MST)
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sync-meetings
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    name: Sync and deploy
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      # The sync script uses only Node built-ins, so no install is needed here.
      - name: Sync meetings from CivicClerk
        run: npm run sync:meetings

      - name: Detect changes
        id: diff
        run: |
          if git diff --quiet -- src/data/meetings.ts; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No calendar changes; nothing to publish."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Calendar changed:"
            git --no-pager diff -- src/data/meetings.ts
          fi

      - name: Commit refreshed data
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/data/meetings.ts
          git commit -m "Auto-sync Town Board meetings from CivicClerk"
          git push

      - name: Install dependencies
        if: steps.diff.outputs.changed == 'true'
        run: npm ci

      - name: Build OpenNext
        if: steps.diff.outputs.changed == 'true'
        run: npm run worker:build
        env:
          NEXT_PUBLIC_BASE_URL: https://townofpaonia.co

      - name: Deploy to Cloudflare Workers
        if: steps.diff.outputs.changed == 'true'
        run: npm run deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
